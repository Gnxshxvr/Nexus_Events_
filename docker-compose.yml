version: '3.8'

services:
  nexus-events-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus_events_platform
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
